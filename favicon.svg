<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .cactus-body { animation: sway 3s ease-in-out infinite; transform-origin: 32px 56px; }
    .cactus-whole { animation: pulse 4s ease-in-out infinite; transform-origin: 32px 32px; }
  </style>
  <g class="cactus-whole">
    <!-- Sand -->
    <ellipse cx="32" cy="58" rx="18" ry="5" fill="#E8C872"/>
    <g class="cactus-body">
      <!-- Main trunk -->
      <rect x="26" y="14" width="12" height="44" rx="6" fill="#2D8B2D" stroke="#1a6b1a" stroke-width="1.5"/>
      <!-- Trunk lines -->
      <line x1="30" y1="16" x2="30" y2="56" stroke="#228B22" stroke-width="1" opacity="0.5"/>
      <line x1="34" y1="16" x2="34" y2="56" stroke="#228B22" stroke-width="1" opacity="0.5"/>
      <!-- Left arm -->
      <path d="M26 32 Q16 32 16 24 Q16 16 22 16" fill="none" stroke="#2D8B2D" stroke-width="10" stroke-linecap="round"/>
      <path d="M26 32 Q16 32 16 24 Q16 16 22 16" fill="none" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Right arm -->
      <path d="M38 26 Q48 26 48 34 Q48 42 42 42" fill="none" stroke="#2D8B2D" stroke-width="10" stroke-linecap="round"/>
      <path d="M38 26 Q48 26 48 34 Q48 42 42 42" fill="none" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Spines -->
      <line x1="26" y1="20" x2="22" y2="18" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="20" x2="42" y2="18" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="26" y1="40" x2="22" y2="38" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="40" x2="42" y2="38" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="14" x2="32" y2="10" stroke="#1a6b1a" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Flower on top -->
      <circle cx="32" cy="10" r="4" fill="#FF6B6B"/>
      <circle cx="32" cy="10" r="2" fill="#FFD93D"/>
    </g>
  </g>
</svg>
